<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>페트병 수거 안내</title>
        <link rel="stylesheet" href="./css/styles.css" />
    </head>
    <style>
        @font-face {
            font-family: 'Isamanru';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10@1.0/GongGothicBold.woff') format('woff');
            font-weight: 200;
            font-display: swap;
        }
        .wrap {
            position: relative;
            display: inline-block;
        }
        .wrap button {
            position: absolute;
            right: 51.6%;
            top: 35%;
            transform: translateX(-50%);
        }
        img {
            width: 1920px;
            height: 100%;
        }
    </style>
    <body>
        <div class="wrap">
            <img src="img/수거공지.png" alt="페트병 수거 공지" />

            <button
                id="btn-admin-enter"
                class="admin-btn"
                style="
                    background-color: transparent;
                    color: white;
                    font-family: 'Isamanru';
                    text-align: center;
                    justify-content: center;

                    width: 300px;
                    height: 300px;
                    cursor: default;
                "
            ></button>
        </div>
        <div id="admin-pin-popup" class="pin-modal" style="display: none">
            <div class="pin-content" role="dialog" aria-modal="true" aria-labelledby="pin-title">
                <h2 id="pin-title">관리자 비밀번호</h2>
                <p class="pin-desc">비밀번호를 입력하세요</p>
                <input
                    id="admin-pin-input"
                    type="password"
                    inputmode="numeric"
                    maxlength="6"
                    autocomplete="one-time-code"
                />
                <p class="pin-desc" style="margin-top: 6px; font-size: 0.9em; color: #888">
                    무단 접속 시 법적으로 처벌받을 수 있습니다.
                </p>

                <div class="pin-keypad" aria-label="관리자 키패드">
                    <button data-k="1">1</button>
                    <button data-k="2">2</button>
                    <button data-k="3">3</button>
                    <button data-k="4">4</button>
                    <button data-k="5">5</button>
                    <button data-k="6">6</button>
                    <button data-k="7">7</button>
                    <button data-k="8">8</button>
                    <button data-k="9">9</button>
                    <button data-k="del" class="pin-key">←</button>
                    <button data-k="0">0</button>
                    <button data-k="clr" class="pin-key">C</button>
                </div>
                <div style="display: flex; gap: 8px; margin-top: 10px">
                    <button id="admin-pin-cancel" class="pin-secondary">취소</button>
                    <button id="admin-pin-submit" class="pin-primary">확인</button>
                </div>
                <div id="admin-pin-error" style="margin-top: 10px; color: #ffb4b4; min-height: 1.2em"></div>
            </div>
        </div>
        <script src="./src/adminPin.js"></script>
        <script src="./src/equipmentStatusRelease.js"></script>
        <script src="./src/hotkeys.js"></script>
        <script>
            const EQUIPMENT_STATUS_API_URL = 'https://petmon.ai.kr/api/device/equipment-status';

            function normalizeApiValue(value) {
                return String(value || '').trim();
            }

            function readConfigValue(obj, keys) {
                if (!obj || typeof obj !== 'object') return '';
                for (const key of keys) {
                    if (obj[key]) return normalizeApiValue(obj[key]);
                }
                return '';
            }

            function parseIniConfig(text) {
                const config = {};
                String(text || '')
                    .split(/\r?\n/)
                    .forEach((line) => {
                        const trimmed = line.trim();
                        if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith(';') || trimmed.startsWith('[')) {
                            return;
                        }
                        const match = trimmed.match(/^([^=:#\s]+)\s*(?:[=:]|\s+)\s*(.+)$/);
                        if (match) config[match[1].trim()] = match[2].trim().replace(/^["']|["']$/g, '');
                    });
                return config;
            }

            async function loadDeviceApiConfig() {
                const params = new URLSearchParams(window.location.search || '');
                const config = {
                    device:
                        normalizeApiValue(params.get('device')) ||
                        normalizeApiValue(params.get('equipment_id')) ||
                        readConfigValue(window.deviceConfig, ['deviceCode', 'device_code', 'device', 'equipment_id']) ||
                        readConfigValue(window.PETMON_CONFIG, [
                            'deviceCode',
                            'device_code',
                            'device',
                            'equipment_id',
                        ]) ||
                        normalizeApiValue(window.PETMON_DEVICE_CODE),
                    group_cd:
                        normalizeApiValue(params.get('group_cd')) ||
                        normalizeApiValue(params.get('group')) ||
                        readConfigValue(window.deviceConfig, ['groupCd', 'group_cd', 'group']) ||
                        readConfigValue(window.PETMON_CONFIG, ['groupCd', 'group_cd', 'group']) ||
                        normalizeApiValue(window.PETMON_GROUP_CD),
                };

                try {
                    const deviceKeys = [
                        'petmon.device',
                        'petmon.deviceCode',
                        'petmon.device_code',
                        'device',
                        'deviceCode',
                        'device_code',
                        'equipment_id',
                    ];
                    const groupKeys = ['petmon.group_cd', 'petmon.groupCd', 'group_cd', 'groupCd', 'group'];
                    for (const key of deviceKeys) {
                        if (!config.device) {
                            config.device = normalizeApiValue(localStorage.getItem(key) || sessionStorage.getItem(key));
                        }
                    }
                    for (const key of groupKeys) {
                        if (!config.group_cd) {
                            config.group_cd = normalizeApiValue(
                                localStorage.getItem(key) || sessionStorage.getItem(key),
                            );
                        }
                    }
                } catch {}

                if (!config.device) {
                    for (const path of ['./petmon.ini', './config.ini', './src/petmon.ini', './src/config.ini']) {
                        try {
                            const response = await fetch(path, { cache: 'no-store' });
                            if (!response.ok) continue;
                            const ini = parseIniConfig(await response.text());
                            config.device =
                                readConfigValue(ini, [
                                    'petmon.device',
                                    'petmon.deviceCode',
                                    'petmon.device_code',
                                    'device',
                                    'deviceCode',
                                    'device_code',
                                    'equipment_id',
                                ]) || config.device;
                            config.group_cd =
                                config.group_cd ||
                                readConfigValue(ini, [
                                    'petmon.group_cd',
                                    'petmon.groupCd',
                                    'group_cd',
                                    'groupCd',
                                    'group',
                                ]);
                            if (config.device) break;
                        } catch {}
                    }
                }

                return {
                    device: normalizeApiValue(config.device).toUpperCase(),
                    group_cd: normalizeApiValue(config.group_cd) || 'etc',
                };
            }

            async function resetEquipmentCollectionAmount() {
                if (typeof window.releaseEquipmentToNormal === 'function') {
                    await window.releaseEquipmentToNormal();
                }

                const config = await loadDeviceApiConfig();
                if (!config.device) {
                    console.warn('equipment amount reset skipped: device code not found');
                    return;
                }

                const response = await fetch(EQUIPMENT_STATUS_API_URL, {
                    method: 'POST',
                    keepalive: true,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        device: config.device,
                        group_cd: config.group_cd,
                        client_unique_id: `COLLECTION-RESET-${Date.now()}`,
                        status: '1',
                        reset_collect_amount: true,
                    }),
                });
                if (!response.ok) {
                    throw new Error(`equipment amount reset failed: ${response.status}`);
                }
            }
            // 페이지 로드 시 현재 개수 표시 (필요 시)
            window.addEventListener('DOMContentLoaded', () => {
                try {
                    const count = localStorage.getItem('petmon.totalBottles') || '800';
                    console.log('현재 페트병 개수:', count);
                } catch (e) {
                    console.error('개수 조회 실패:', e);
                }
            });

            (function () {
                const BTN = document.getElementById('btn-admin-enter');
                let clickCount = 0;
                let clickTimer = null;

                BTN?.addEventListener('click', async () => {
                    try {
                        clickCount++;

                        // 첫 클릭이면 타이머 시작
                        if (clickCount === 1) {
                            clickTimer = setTimeout(() => {
                                clickCount = 0; // 2초 경과 시 카운트 리셋
                            }, 2000);
                        }

                        // 5번 클릭 달성
                        if (clickCount >= 5) {
                            clearTimeout(clickTimer);
                            clickCount = 0;

                            if (typeof window.requireAdminPin === 'function') {
                                const ok = await window.requireAdminPin();
                                if (ok) {
                                    await resetEquipmentCollectionAmount();
                                    // 비밀번호 확인 성공 시 localStorage 리셋
                                    try {
                                        localStorage.setItem('petmon.totalBottles', '0');
                                        alert('수거가 완료되었습니다. 페트병 개수가 초기화되었습니다.');
                                        window.location.href = 'index.html';
                                    } catch (e) {
                                        console.error('리셋 실패:', e);
                                        alert('오류가 발생했습니다. 다시 시도해주세요.');
                                    }
                                }
                            } else {
                                // PIN 모듈이 로드되지 않았을 때
                                alert('관리자 인증이 필요합니다.');
                            }
                        }
                    } catch {}
                });
            })();
        </script>
    </body>
</html>
